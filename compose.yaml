services:
  backend:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    working_dir: /src/backend/AzuTopo.Api
    command: dotnet run --project AzuTopo.Api.csproj --urls http://0.0.0.0:5256
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://0.0.0.0:5256
    ports:
      - '5256:5256'
    volumes:
      - ./AzuTopo.slnx:/src/AzuTopo.slnx:ro
      - ./backend:/src/backend
      - dotnet-packages:/root/.nuget/packages
      - backend-bin:/src/backend/AzuTopo.Api/bin
      - backend-obj:/src/backend/AzuTopo.Api/obj

  frontend:
    image: node:24-bookworm-slim
    working_dir: /app
    command: sh -c "corepack enable && pnpm install --frozen-lockfile --force && pnpm dev"
    environment:
      CI: 'true'
      VITE_TOPOLOGY_API_BASE_URL: http://localhost:5256
    ports:
      - '5173:5173'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:5173']
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 120s
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    depends_on:
      - backend

volumes:
  backend-bin:
  backend-obj:
  dotnet-packages:
  frontend-node-modules:
